name: Tests

on:
  push:
    branches: [main, dev, test]
  pull_request:
    branches: [main, dev, test]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pytest numpy scipy pyvista pygcode matplotlib networkx cyclopts euclid3 trimesh robust_laplacian scikit-image tetgen open3d

      - name: Create slicer venvs (symlink to system Python for smoke tests)
        run: |
          for dir in conic_slicer radial_non_planar_slicer hybrid_slicer generic_non_planar_slicer native_slicer; do
            mkdir -p "$dir/venv/bin"
            ln -sf "$(which python3)" "$dir/venv/bin/python3"
          done

      - name: Run smoke tests
        run: pytest tests/ -m smoke -v

  native-slicer-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest numpy scipy pyvista matplotlib trimesh networkx robust_laplacian scikit-image

      - name: Run native slicer tests
        working-directory: native_slicer
        run: |
          python -c "
          import sys, os; sys.path.insert(0, os.getcwd())
          print('cwd:', os.getcwd())
          print('sys.path:', sys.path[:5])
          print('kinematics __init__.py exists:', os.path.exists('cxzb_slicer/kinematics/__init__.py'))
          print('ls kinematics:', os.listdir('cxzb_slicer/kinematics'))
          import cxzb_slicer; print('cxzb_slicer location:', cxzb_slicer.__file__)
          import cxzb_slicer.kinematics as k; print('kinematics spec:', k.__spec__)
          print('kinematics file:', getattr(k, '__file__', 'NO FILE'))
          print('kinematics path:', getattr(k, '__path__', 'NO PATH'))
          "
          python -m pytest tests/ -v --import-mode=importlib
